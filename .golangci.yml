version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gosec
    - revive
  settings:
    revive:
      rules:
        - name: blank-imports
          disabled: true
        - name: unused-parameter
        - name: receiver-naming
        - name: error-strings
  exclusions:
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    rules:
      - linters:
          - gosec
        path: ".*_test\\.go"
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
